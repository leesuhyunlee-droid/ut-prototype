<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>가입 유형 선택 — SKT ConShopping</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; }

    /* ── 데스크탑: 폰 프레임 ── */
    @media (min-width: 768px) {
      body {
        background: #a8aab4;
        display: flex; align-items: center; justify-content: center;
        min-height: 100dvh;
      }
      #app {
        position: relative;
        width: 375px; height: 812px;
        overflow: hidden;
        border-radius: 32px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
        flex-shrink: 0;
      }
      .app-scroll {
        position: absolute; inset: 0;
        overflow-y: auto; overflow-x: hidden;
        scrollbar-width: none;
      }
      .app-scroll::-webkit-scrollbar { display: none; }
      .bottom-bar { position: absolute; }
    }
    /* ── 모바일 ── */
    @media (max-width: 767px) {
      body { background: #f7f8fa; }
      #app { position: relative; width: 100%; min-height: 100dvh; }
      .app-scroll { width: 100%; overflow-x: hidden; position: relative; }
      .bottom-bar { position: fixed; }
    }

    /* ── 페이지 전환 ── */
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    .app-scroll { animation: slideInRight 0.28s cubic-bezier(0.4,0,0.2,1) forwards; padding-top: 103px; }

    /* ── 고정 헤더 ── */
    #page-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      background: #f7f8fa;
    }
    @media (max-width: 767px) {
      #page-header { position: fixed; }
    }

    /* ── 옵션 카드 ── */
    .option-card {
      background: rgba(255,255,255,0.4);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 24px;
      padding: 12px 10px;
      width: 335px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }
    .option-card.selected {
      background: rgba(255,255,255,0.9);
      border-color: #111;
    }

    /* ── 하단 버튼 ── */
    .bottom-bar {
      bottom: 0; left: 0; right: 0;
      z-index: 40;
      padding: 0 20px 32px;
      background: linear-gradient(to top, #f7f8fa 65%, rgba(247,248,250,0));
      border-radius: 28px 28px 0 0;
    }

    /* ── 가입 중단 얼럿 ── */
    @keyframes alertIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    #alert-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }
    @media (min-width: 768px) {
      #alert-overlay { position: absolute; }
    }
    #alert-overlay.visible { display: flex; }
    #alert-box {
      background: white;
      border-radius: 20px;
      padding: 28px 20px 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: alertIn 0.2s cubic-bezier(0.34,1.2,0.64,1) forwards;
    }
    .alert-btn {
      flex: 1;
      border-radius: 14px;
      padding: 14px 0;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.6px;
      line-height: 1.3;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    }

    /* ── AI 패턴 분석 배너 ── */
    #ai-banner {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    #ai-banner.visible {
      max-height: 80px;
      opacity: 1;
    }
    #next-btn {
      width: 100%;
      background: #a7a7a7;
      border: none;
      border-radius: 20px;
      padding: 16px 32px;
      cursor: default;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.64px;
      line-height: 1.3;
      transition: background 0.3s ease;
    }
  </style>
</head>
<body>
<div id="app" style="background: #f7f8fa;">

  <!-- ── 고정 헤더 ── -->
  <div id="page-header">
    <div style="display: flex; align-items: center; padding: 11px 19px;">
      <button onclick="goBack()" style="width: 46px; height: 46px; background: rgba(255,255,255,0.4);
              border-radius: 999px; box-shadow: 0 0 19px rgba(0,0,0,0.05);
              border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M14 18L7 11L14 4" stroke="#101010" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div style="padding: 0 20px 8px;">
      <div style="position: relative; width: 328px; height: 6px; background: #f2f2f2; border-radius: 3px;">
        <div style="position: absolute; left: 0; top: 0; width: 41px; height: 6px; background: #1c1c1e; border-radius: 3px;"></div>
      </div>
      <p style="font-size: 12px; font-weight: 400; color: #1c1c1e; letter-spacing: -0.5px; line-height: 1.4; margin-top: 4px;">1/7</p>
    </div>
  </div>

  <div class="app-scroll">

    <!-- ── 본문 ── -->
    <div style="display: flex; flex-direction: column; gap: 20px; padding-top: 16px;">

      <!-- 텍스트 -->
      <div style="padding: 20px; display: flex; flex-direction: column; gap: 18.98px;">
        <p style="font-size: 16px; font-weight: 500; color: #222; opacity: 0.2;
                  letter-spacing: -0.64px; line-height: 1.4;">
          iPhone 20 Air 블랙 256GB를 선택하셨어요.
        </p>
        <p style="font-size: 18px; font-weight: 500; letter-spacing: -0.07em; line-height: 1.4; width: 325px;
                  background: linear-gradient(to right, #2f2f2f 40%, #959595 100%);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          확인해 보니 현재 사용 중인 번호가 있으세요.&nbsp;<br>번호는 그대로 유지한 채 가입을 진행할까요?
        </p>
      </div>

      <!-- 옵션 카드 -->
      <div style="display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%;">
        <div class="option-card" onclick="selectOption(this, 0)">
          <div style="padding: 10.777px 14.37px; border-radius: 17.962px;">
            <p style="font-size: 14.37px; font-weight: 500; color: #101010; letter-spacing: -0.2874px; line-height: 1.3;">
              010-****-5678 번호로 가입할래요
            </p>
          </div>
        </div>
        <div class="option-card" onclick="selectOption(this, 1)">
          <div style="padding: 10.777px 14.37px; border-radius: 17.962px;">
            <p style="font-size: 14.37px; font-weight: 500; color: #101010; letter-spacing: -0.2874px; line-height: 1.3;">
              010-****-4321 번호로 가입할래요
            </p>
          </div>
        </div>
        <div class="option-card" onclick="selectOption(this, 2)">
          <div style="padding: 10.777px 14.37px; border-radius: 17.962px;">
            <p style="font-size: 14.37px; font-weight: 500; color: #101010; letter-spacing: -0.2874px; line-height: 1.3;">
              새 번호로 가입할래요
            </p>
          </div>
        </div>
      </div>

    </div>

    <!-- 스크롤 여백 (하단 버튼 공간) -->
    <div style="height: 130px;"></div>

  </div><!-- /.app-scroll -->

  <!-- ── 하단 버튼 ── -->
  <div class="bottom-bar">

    <!-- AI 배너: 회선 선택 시 등장 -->
    <div id="ai-banner">
      <div style="height: 80px; padding: 0 0 16px; display: flex; gap: 20px; align-items: center; backdrop-filter: blur(5px);">
        <p id="ai-banner-text" style="flex: 1; min-width: 0; font-size: 14px; font-weight: 500; letter-spacing: -0.56px; line-height: 1.4;
                  background: linear-gradient(to right, #5940df 30%, #000 100%);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        </p>
        <button style="background: rgba(1,8,59,0.1); border: none; border-radius: 19px; padding: 10px 12px;
                       display: flex; gap: 4px; align-items: center; cursor: pointer; flex-shrink: 0;
                       font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;">
          <img src="https://www.figma.com/api/mcp/asset/2b0c8735-78eb-445a-ab12-c54872814b9d"
               style="width: 18px; height: 18px; flex-shrink: 0;" alt="">
          <span style="font-size: 13px; font-weight: 600; color: #5940df; letter-spacing: -0.4px; line-height: 1.3; white-space: nowrap;">자세히 보기</span>
        </button>
      </div>
    </div>

    <button id="next-btn" onclick="goNext()">다음</button>
  </div>

  <!-- ── 가입 중단 얼럿 ── -->
  <div id="alert-overlay">
    <div id="alert-box">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <p style="font-size: 17px; font-weight: 600; color: #101010; letter-spacing: -0.68px; line-height: 1.3;">가입을 중단하시겠어요?</p>
        <p style="font-size: 14px; font-weight: 400; color: #101010; opacity: 0.45; letter-spacing: -0.56px; line-height: 1.4;">지금까지 선택한 가입 정보가 모두 사라져요.</p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="alert-btn" onclick="confirmStop()" style="border: 1px solid #ddd; background: white; color: #101010;">중단하기</button>
        <button class="alert-btn" onclick="closeAlert()" style="border: none; background: #1c1c1e; color: white;">계속 진행하기</button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<script>
  function goBack() {
    showAlert();
  }
  function showAlert() {
    document.getElementById('alert-overlay').classList.add('visible');
  }
  function closeAlert() {
    document.getElementById('alert-overlay').classList.remove('visible');
  }
  function confirmStop() {
    window.location.href = './scenario3-2.html';
  }

  var selectedCard = null;

  var bannerTexts = [
    '업무 이용 패턴을 분석해 최적의 가입<br>옵션을 준비했어요.',
    '최근 이용 패턴을 분석해 가장 적합한<br>가입 옵션을 준비했어요.',
    null
  ];

  function selectOption(card, index) {
    document.querySelectorAll('.option-card').forEach(function(c) {
      c.classList.remove('selected');
    });
    card.classList.add('selected');
    selectedCard = card;
    sessionStorage.setItem('s33_selected', index);

    var btn = document.getElementById('next-btn');
    btn.style.background = '#1c1c1e';
    btn.style.cursor     = 'pointer';

    var banner = document.getElementById('ai-banner');
    var bannerText = document.getElementById('ai-banner-text');
    var text = bannerTexts[index];

    if (banner && bannerText) {
      // 항상 닫힘 → 텍스트 교체 → 열림 순서로 동일한 애니메이션 재생
      banner.classList.remove('visible');
      setTimeout(function() {
        if (text) {
          bannerText.innerHTML = text;
          banner.classList.add('visible');
        }
      }, 350);
    }
  }

  function goNext() {
    if (!selectedCard) return;
    window.location.href = './scenario3-4.html';
  }

  // 이전 방문 시 선택값 복원
  (function() {
    var saved = sessionStorage.getItem('s33_selected');
    if (saved === null) return;
    var cards = document.querySelectorAll('.option-card');
    var idx = parseInt(saved);
    if (cards[idx]) selectOption(cards[idx], idx);
  })();

  // 데스크탑에서 bottom-bar를 #app 기준으로 이동
  (function() {
    var app = document.getElementById('app');
    var bar = document.querySelector('.bottom-bar');
    if (app && bar && window.innerWidth >= 768) {
      app.appendChild(bar);
    }
  })();
</script>
</body>
</html>
