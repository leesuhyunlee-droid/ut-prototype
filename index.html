<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>UT 홈 — SKT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; }

    @media (min-width: 768px) {
      body { background: #a8aab4; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
      #app { position: relative; width: 375px; height: 812px; overflow: hidden; border-radius: 32px;
             box-shadow: 0 40px 100px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06); flex-shrink: 0; }
      .app-scroll { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
      .app-scroll::-webkit-scrollbar { display: none; }
    }
    @media (max-width: 767px) {
      body { background: #f7f8fa; }
      #app { position: relative; width: 100%; min-height: 100dvh; }
      .app-scroll { width: 100%; overflow-x: hidden; position: relative; }
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .app-scroll { animation: fadeIn 0.32s ease forwards; }

    .ut-card {
      background: rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 27px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .scenario-row {
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 14px 0;
      cursor: pointer;
    }
    .scenario-row:not(:last-child) {
      border-bottom: 1px solid rgba(6,12,31,0.05);
    }
    .scenario-row:active { opacity: 0.7; }
  </style>
</head>
<body>
<div id="app" style="background:#f7f8fa;">
  <div class="app-scroll">
    <div style="padding: 88px 19px 40px; display: flex; flex-direction: column; gap: 8px;">

      <!-- 인사말 -->
      <div style="padding: 0 13px 18px;">
        <p style="font-size:26px; font-weight:400; color:#3617ce; letter-spacing:-1.56px; line-height:1.25;">안녕하세요,</p>
        <p style="font-size:26px; font-weight:400; color:#3617ce; letter-spacing:-1.56px; line-height:1.25;">UT에 오신것을 환영합니다.</p>
      </div>

      <!-- 핵심 컨셉 검증 -->
      <div class="ut-card">
        <p style="font-size:17px; font-weight:500; color:#060c1f; letter-spacing:-0.86px; line-height:1.3;">핵심 컨셉 검증</p>
        <div style="display:flex; flex-direction:column;">

          <div class="scenario-row" style="padding: 7px 0;" onclick="window.location.href='https://main-concept1.vercel.app/'">
            <div style="flex:1; min-width:0;">
              <p style="font-size:14.5px; font-weight:500; color:#060c1f; letter-spacing:-0.58px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 Main Concept</p>
            </div>
          </div>

        </div>
      </div>

      <!-- 시나리오 검증 -->
      <div class="ut-card" style="margin-top:8px;">
        <p style="font-size:17px; font-weight:500; color:#060c1f; letter-spacing:-0.86px; line-height:1.3;">시나리오 검증</p>
        <div style="display:flex; flex-direction:column;">

          <!-- Scenario 1 -->
          <div class="scenario-row" onclick="window.location.href='https://skt-scenario1.vercel.app/'">
            <div style="flex:1; min-width:0;">
              <p style="font-size:14.5px; font-weight:500; color:#060c1f; letter-spacing:-0.58px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 Scenario 1. 요금제 변경하기</p>
            </div>
            <div style="width:28px; height:28px; border-radius:6px; overflow:hidden; flex-shrink:0; background:rgba(35,55,155,0.05);">
              <img src="https://www.figma.com/api/mcp/asset/dbc6658f-52b1-4a8d-845f-5efd034e6a4b" style="width:100%; height:100%; object-fit:cover;" alt="">
            </div>
          </div>

          <!-- Scenario 2 -->
          <div class="scenario-row" onclick="window.location.href='https://skt-scenario2.vercel.app/'">
            <div style="flex:1; min-width:0;">
              <p style="font-size:14.5px; font-weight:500; color:#060c1f; letter-spacing:-0.58px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 Scenario 2. 혜택 이용하기</p>
            </div>
            <div style="width:28px; height:28px; border-radius:6px; overflow:hidden; flex-shrink:0; background:rgba(35,55,155,0.05);">
              <img src="https://www.figma.com/api/mcp/asset/6c5d3ce9-8c14-4cb6-941e-14c46a88b570" style="width:100%; height:100%; object-fit:cover;" alt="">
            </div>
          </div>

          <!-- Scenario 3 → scenario3.html -->
          <div class="scenario-row" onclick="window.location.href='./scenario3.html'">
            <div style="flex:1; min-width:0;">
              <p style="font-size:14.5px; font-weight:500; color:#060c1f; letter-spacing:-0.58px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 Scenario 3. 단말기 구매하기</p>
            </div>
            <div style="width:28px; height:28px; border-radius:6px; overflow:hidden; flex-shrink:0; background:rgba(35,55,155,0.05);">
              <img src="./assets_icon/scenario3icon.png" style="width:100%; height:100%; object-fit:cover;" alt="">
            </div>
          </div>

          <!-- Scenario 4 -->
          <div class="scenario-row" onclick="window.location.href='https://skt-scenario4.vercel.app/output/prototype/4.html'">
            <div style="flex:1; min-width:0;">
              <p style="font-size:14.5px; font-weight:500; color:#060c1f; letter-spacing:-0.58px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 Scenario 4. 데이터 선물하기</p>
            </div>
            <div style="width:28px; height:28px; border-radius:6px; flex-shrink:0; background:#f4f5fa; display:flex; align-items:center; justify-content:center;">
              <img src="https://www.figma.com/api/mcp/asset/2e30cbb9-3194-4bfb-a53e-dfcc204f104f"
                   style="width:16px; height:16px; object-fit:contain;" alt="">
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
