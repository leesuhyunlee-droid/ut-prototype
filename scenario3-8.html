<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>추가 서비스 선택 — SKT ConShopping</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; }

    /* ── 데스크탑: 폰 프레임 ── */
    @media (min-width: 768px) {
      body {
        background: #a8aab4;
        display: flex; align-items: center; justify-content: center;
        min-height: 100dvh;
      }
      #app {
        position: relative;
        width: 375px; height: 812px;
        overflow: hidden;
        border-radius: 32px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
        flex-shrink: 0;
      }
      .app-scroll {
        position: absolute; inset: 0;
        overflow-y: auto; overflow-x: hidden;
        scrollbar-width: none;
      }
      .app-scroll::-webkit-scrollbar { display: none; }
      .bottom-bar { position: absolute; }
    }
    /* ── 모바일 ── */
    @media (max-width: 767px) {
      body { background: #f7f8fa; }
      #app { position: relative; width: 100%; min-height: 100dvh; }
      .app-scroll { width: 100%; overflow-x: hidden; position: relative; }
      .bottom-bar { position: fixed; will-change: transform; transform: translateZ(0); }
    }

    /* ── 페이지 전환 ── */
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    .app-scroll { animation: slideInRight 0.28s cubic-bezier(0.4,0,0.2,1) forwards; padding-top: 103px; }

    /* ── 고정 헤더 ── */
    #page-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      background: #f7f8fa;
    }
    @media (max-width: 767px) {
      #page-header { position: fixed; }
    }

    /* ── 서비스 카드 ── */
    .service-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s ease;
      width: 100%;
    }
    .service-card.selected {
      border-color: #111;
    }

    /* ── 선택 칩 ── */
    .select-chip {
      border: 1px solid #111;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 400;
      color: #111;
      letter-spacing: -1px;
      line-height: 1.4;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      background: white;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .select-chip.selected {
      background: #1c1c1e;
      color: white;
      border-color: #1c1c1e;
    }

    /* ── 하단 버튼 영역 ── */
    .bottom-bar {
      bottom: 0; left: 0; right: 0;
      z-index: 40;
      padding-top: 16px;
      padding-bottom: 32px;
      background: linear-gradient(to top, #f7f8fa 65%, rgba(247,248,250,0));
    }
    .cta-btn {
      flex: 1;
      border-radius: 20px;
      padding: 16px 0;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.64px;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
    }

    /* ── 가입 중단 얼럿 ── */
    @keyframes alertIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    #alert-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }
    @media (min-width: 768px) {
      #alert-overlay { position: absolute; }
    }
    #alert-overlay.visible { display: flex; }
    #alert-box {
      background: white;
      border-radius: 20px;
      padding: 28px 20px 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: alertIn 0.2s cubic-bezier(0.34,1.2,0.64,1) forwards;
    }
    .alert-btn {
      flex: 1;
      border-radius: 14px;
      padding: 14px 0;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.6px;
      line-height: 1.3;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div id="app" style="background: #f7f8fa;">

  <!-- ── 고정 헤더 ── -->
  <div id="page-header">
    <div style="display: flex; align-items: center; padding: 11px 19px;">
      <button onclick="goBack()" style="width: 46px; height: 46px; background: rgba(255,255,255,0.4);
              border-radius: 999px; box-shadow: 0 0 19px rgba(0,0,0,0.05);
              border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M14 18L7 11L14 4" stroke="#101010" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div style="padding: 0 20px 8px;">
      <div style="position: relative; width: 328px; height: 6px; background: #f2f2f2; border-radius: 3px;">
        <div style="position: absolute; left: 0; top: 0; width: 273px; height: 6px; background: #1c1c1e; border-radius: 3px;"></div>
      </div>
      <p style="font-size: 12px; font-weight: 400; color: #1c1c1e; letter-spacing: -0.5px; line-height: 1.4; margin-top: 4px;">6/7</p>
    </div>
  </div>

  <div class="app-scroll">

    <!-- ── 본문 ── -->
    <div style="display: flex; flex-direction: column; gap: 20px; padding-top: 16px;">

      <!-- 제목 -->
      <div style="padding: 0 20px;">
        <p style="font-size: 18px; font-weight: 500; letter-spacing: -1.26px; line-height: 1.4;
                  background: linear-gradient(to right, #2f2f2f 40%, #959595 100%);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          휴대폰 보험, AI 서비스 등<br>추가로 이용할 서비스가 있으실까요?
        </p>
      </div>

      <!-- 카드 리스트 -->
      <div style="display: flex; flex-direction: column; gap: 10px; padding: 0 20px; align-items: center;">

        <!-- 카드 1: 분실파손6 i일반 (이용중) -->
        <div class="service-card" data-idx="0">
          <div style="display: flex; flex-direction: column; gap: 17px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;">
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <p style="font-size: 12px; font-weight: 500; color: #101010; opacity: 0.8; letter-spacing: -0.48px; line-height: 1.4;">이용중</p>
                <p style="font-size: 16px; font-weight: 600; color: #101010; opacity: 0.9; letter-spacing: -0.96px; line-height: 1.2;">분실파손6 i일반(온라인)</p>
              </div>
              <p style="font-size: 12px; font-weight: 500; color: #101010; letter-spacing: -0.24px; line-height: 1.3; white-space: nowrap; flex-shrink: 0;">5,400원</p>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
              <p style="font-size: 12px; font-weight: 400; color: #9f9f9f; letter-spacing: -0.48px; line-height: 1.2; width: 164px;">150만원 이하인 아이폰 분실/파손에 대비할 수 있는 보험</p>
              <button class="select-chip" onclick="toggleItem(0)">선택</button>
            </div>
          </div>
        </div>

        <!-- 카드 2: 분실파손6 고급 (AI 추천) -->
        <div class="service-card" data-idx="1">
          <div style="display: flex; flex-direction: column; gap: 17px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;">
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 4px;">
                  <img src="./assets_icon/figma/d57c6fd6-4270-452e-bf36-0692952b9b38.svg" style="width: 16px; height: 16px;" alt="">
                  <p style="font-size: 12px; font-weight: 500; color: #3617ce; opacity: 0.8; letter-spacing: -0.48px; line-height: 1.4;">추천</p>
                </div>
                <p style="font-size: 16px; font-weight: 600; color: #101010; opacity: 0.9; letter-spacing: -0.96px; line-height: 1.2;">분실파손6 고급(온라인)</p>
              </div>
              <p style="font-size: 12px; font-weight: 500; color: #101010; letter-spacing: -0.24px; line-height: 1.3; white-space: nowrap; flex-shrink: 0;">6,200원</p>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
              <p style="font-size: 12px; font-weight: 400; color: #9f9f9f; letter-spacing: -0.48px; line-height: 1.2; width: 164px;">100만원 이상인 안드로이드 분실/파손에 대비할 수 있는 보험</p>
              <button class="select-chip" onclick="toggleItem(1)">선택</button>
            </div>
          </div>
        </div>

        <!-- 카드 3: 해외주식노트 (AI 추천) -->
        <div class="service-card" data-idx="2">
          <div style="display: flex; flex-direction: column; gap: 17px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;">
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 4px;">
                  <img src="./assets_icon/figma/d57c6fd6-4270-452e-bf36-0692952b9b38.svg" style="width: 16px; height: 16px;" alt="">
                  <p style="font-size: 12px; font-weight: 500; color: #3617ce; opacity: 0.8; letter-spacing: -0.48px; line-height: 1.4;">추천</p>
                </div>
                <p style="font-size: 16px; font-weight: 600; color: #101010; opacity: 0.9; letter-spacing: -0.96px; line-height: 1.2;">해외주식노트</p>
              </div>
              <p style="font-size: 12px; font-weight: 500; color: #101010; letter-spacing: -0.24px; line-height: 1.3; white-space: nowrap; flex-shrink: 0;">5,500원</p>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
              <p style="font-size: 12px; font-weight: 400; color: #9f9f9f; letter-spacing: -0.48px; line-height: 1.2;">미국 주식에 대한 AI 예측 및 종목 추천 서비스</p>
              <button class="select-chip" onclick="toggleItem(2)">선택</button>
            </div>
          </div>
        </div>

        <!-- 전체 보기 -->
        <button style="border: 1px solid #e5e5e5; border-radius: 16px; padding: 6px 12px;
                       font-size: 13px; font-weight: 400; color: #444; letter-spacing: -0.4px;
                       line-height: 1.4; cursor: pointer; background: white;
                       font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;">
          전체 보기
        </button>

      </div>
    </div>

    <!-- 스크롤 여백 -->
    <div style="height: 160px;"></div>

  </div><!-- /.app-scroll -->

  <!-- ── 하단 버튼 영역 ── -->
  <div class="bottom-bar">
    <!-- 예상 월 납부 금액 -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 24px 14px;">
      <p style="font-size: 14px; font-weight: 500; color: #101010; letter-spacing: -0.56px; line-height: 1.5;">예상 월 납부 금액</p>
      <div style="display: flex; align-items: center; gap: 4px;">
        <p id="monthly-amount" style="font-size: 15px; font-weight: 600; color: #000; letter-spacing: -1px; line-height: 26px;">월 118,700원</p>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4.5 6.5L8 10L11.5 6.5" stroke="#1c1c1e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <!-- 이전 / 다음 버튼 -->
    <div style="display: flex; gap: 8px; padding: 0 20px;">
      <button onclick="goPrev()" class="cta-btn"
              style="border: 1px solid #111; background: white; color: #101010;">이전</button>
      <button onclick="goNext()" class="cta-btn"
              style="border: none; background: #1c1c1e; color: white;">다음</button>
    </div>
  </div>

  <!-- ── 가입 중단 얼럿 ── -->
  <div id="alert-overlay">
    <div id="alert-box">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <p style="font-size: 17px; font-weight: 600; color: #101010; letter-spacing: -0.68px; line-height: 1.3;">가입을 중단하시겠어요?</p>
        <p style="font-size: 14px; font-weight: 400; color: #101010; opacity: 0.45; letter-spacing: -0.56px; line-height: 1.4;">지금까지 선택한 가입 정보가 모두 사라져요.</p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="alert-btn" onclick="confirmStop()" style="border: 1px solid #ddd; background: white; color: #101010;">중단하기</button>
        <button class="alert-btn" onclick="closeAlert()" style="border: none; background: #1c1c1e; color: white;">계속 진행하기</button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<script>
  function goBack() { showAlert(); }
  function goPrev() { window.location.href = './scenario3-7.html'; }
  function showAlert() { document.getElementById('alert-overlay').classList.add('visible'); }
  function closeAlert() { document.getElementById('alert-overlay').classList.remove('visible'); }
  function confirmStop() { window.location.href = './scenario3-2.html'; }

  var selectedItems = [];
  var servicePrices = [5400, 6200, 5500];
  var baseAmount = 118700;

  function toggleItem(idx) {
    var pos = selectedItems.indexOf(idx);
    if (pos !== -1) {
      selectedItems.splice(pos, 1);
    } else {
      selectedItems.push(idx);
    }
    updateUI();
  }

  function updateUI() {
    var cards = document.querySelectorAll('.service-card');
    cards.forEach(function(card, i) {
      var chip = card.querySelector('.select-chip');
      var isSelected = selectedItems.indexOf(i) !== -1;
      card.classList.toggle('selected', isSelected);
      chip.classList.toggle('selected', isSelected);
      chip.textContent = isSelected ? '선택됨' : '선택';
    });

    var total = baseAmount;
    selectedItems.forEach(function(i) { total += servicePrices[i]; });
    document.getElementById('monthly-amount').textContent = '월 ' + total.toLocaleString() + '원';
  }

  function goNext() {
    window.location.href = './scenario3-9.html';
  }

  // 데스크탑에서 bottom-bar / alert-overlay를 #app 기준으로 이동
  (function() {
    var app = document.getElementById('app');
    if (app && window.innerWidth >= 768) {
      var bar = document.querySelector('.bottom-bar');
      if (bar) app.appendChild(bar);
      var overlay = document.getElementById('alert-overlay');
      if (overlay) app.appendChild(overlay);
    }
  })();

  // 모바일: bottom-bar를 body 최상단으로 이동해 slideInRight 컴포지팅 레이어에서 완전 분리
  if (window.innerWidth < 768) {
    var _bar = document.querySelector('.bottom-bar');
    if (_bar) document.body.appendChild(_bar);
  }

  // slideInRight 애니메이션 종료 후 transform 레이어 해제 (안드로이드 fixed 버튼 노출 문제 수정)
  var scrollEl = document.querySelector('.app-scroll');
  if (scrollEl) {
    scrollEl.addEventListener('animationend', function() {
      scrollEl.style.animation = 'none';
    }, { once: true });
  }
</script>
</body>
</html>
